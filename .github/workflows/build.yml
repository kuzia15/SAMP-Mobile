name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: kuzia15/SAMP-Mobile
          ref: GTA-2.11

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix known case-sensitivity issues
        run: |
          cd app/src/main/cpp/samp
          find . -iname "playertablist.h" ! -name "playerTabList.h" -exec sh -c 'cp "$0" "$(dirname "$0")/playerTabList.h"' {} \;
          find . -iname "rgba.h" | while read f; do
            d=$(dirname "$f")
            b=$(basename "$f")
            if [ "$b" != "RGBA.h" ] && [ ! -f "$d/RGBA.h" ]; then
              echo "#include \"$b\"" > "$d/RGBA.h"
            fi
          done
          if [ -d vendor/raknet ] && [ ! -d vendor/RakNet ]; then
            mkdir -p vendor/RakNet
            for f in vendor/raknet/*.h; do
              name=$(basename "$f")
              echo "#include \"../raknet/$name\"" > "vendor/RakNet/$name"
            done
          fi

      - name: Fix bad maven repo and library version
        run: |
          sed -i "/mint.splunk.com/d" build.gradle
          sed -i "s/PRDownloader:1.0.1/PRDownloader:1.0.2/" app/build.gradle

      - name: Generate debug keystore
        run: |
          mkdir -p "$GITHUB_WORKSPACE/../keys"
          keytool -genkeypair -v -keystore "$GITHUB_WORKSPACE/../keys/new.jks" -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass 123123 -keypass 123123 -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
